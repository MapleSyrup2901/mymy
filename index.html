<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>at (Maplesyrup) - Portfolio & Book Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8',
                            500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        body { transition: background-color 0.3s ease; }
        .glass-effect { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass-effect { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* สไตล์หน้าจอดำ (Overlay) */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 1s ease;
        }
        #overlay-text {
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse-text 2s infinite;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .book-card { transition: all 0.3s ease; transform-origin: center bottom; }
        .book-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); }
        .avatar-container { position: relative; }
        .avatar-container::before { content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #ffeaa7); border-radius: 50%; z-index: -1; opacity: 0.7; animation: pulse-slow 4s infinite; }
        .music-player { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">
    
    <div id="overlay">
        <div id="overlay-text">Click anywhere to enter</div>
    </div>

    <div class="fixed top-4 right-4 z-50">
        <button id="themeToggle" class="p-3 rounded-full glass-effect shadow-lg hover:shadow-xl transition-all">
            <i id="sunIcon" class="fas fa-sun text-yellow-500 hidden"></i>
            <i id="moonIcon" class="fas fa-moon text-gray-700 dark:text-gray-300"></i>
        </button>
    </div>
    
    <div class="fixed bottom-4 right-4 z-50 music-player rounded-full p-4 shadow-2xl flex items-center justify-center w-14 h-14">
        <button id="musicToggle" class="text-white hover:scale-110 transition-transform focus:outline-none">
            <i id="playIcon" class="fas fa-play text-xl ml-1"></i>
            <i id="pauseIcon" class="fas fa-pause text-xl hidden"></i>
        </button>
        <audio id="backgroundMusic" loop>
            <source src="music.mp3" type="audio/mpeg"> 
            <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <header class="text-center mb-16 pt-8">
            <div class="flex flex-col items-center">
                <div class="avatar-container mb-6">
                    <img src="profile.jpeg" alt="Avatar" class="w-40 h-40 rounded-full border-4 border-white dark:border-gray-800 shadow-2xl object-cover">
                </div>
                <h1 class="heading-font text-4xl md:text-5xl font-bold mb-6">atchanonr <span class="text-primary-600 dark:text-primary-400">(Maplesyrup)</span></h1>
            </div>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="rounded-2xl glass-effect p-6 shadow-lg">
                    <h2 class="heading-font text-2xl font-bold mb-4 flex items-center"><i class="fas fa-user-circle mr-3 text-primary-500"></i> About Me</h2>
                    <div class="mb-6"><p class="text-gray-700 dark:text-gray-300 mb-4 leading-relaxed">ลงหนังสือ หนังที่ชอบ</p><p class="text-gray-700 dark:text-gray-300 mb-4 leading-relaxed">computer science kusrc.</p></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="bg-gradient-to-r from-blue-50 to-blue-100 dark:from-blue-900/30 dark:to-blue-800/20 p-4 rounded-xl"><div class="flex items-center mb-2"><i class="fas fa-brain text-blue-500 mr-2"></i><h3 class="font-semibold">Personality Type</h3></div><div class="text-2xl font-bold text-blue-700 dark:text-blue-300">???</div></div>
                        <div class="bg-gradient-to-r from-green-50 to-green-100 dark:from-green-900/30 dark:to-green-800/20 p-4 rounded-xl"><div class="flex items-center mb-2"><i class="fas fa-map-marker-alt text-green-500 mr-2"></i><h3 class="font-semibold">Location</h3></div><div class="text-2xl font-bold text-green-700 dark:text-green-300">Chonburi</div></div>
                    </div>
                    <div class="bg-gradient-to-r from-purple-50 to-pink-50 dark:from-purple-900/20 dark:to-pink-900/20 p-4 rounded-xl"><h3 class="font-semibold mb-3 flex items-center"><i class="fas fa-envelope text-purple-500 mr-2"></i> Contact</h3><div class="flex flex-col sm:flex-row sm:items-center justify-between"><a href="mailto:phasxnr@gmail.com" class="text-lg font-medium text-purple-700 dark:text-purple-300 hover:text-purple-800 transition-colors">phasxnr@gmail.com</a></div></div>
                </div>
                
                <div class="rounded-2xl glass-effect p-6 shadow-lg">
                    <div class="flex justify-between items-center mb-6"><h2 class="heading-font text-2xl font-bold flex items-center"><i class="fas fa-book-open mr-3 text-primary-500"></i> Book Collection</h2><button id="addBookBtn" class="bg-primary-500 hover:bg-primary-600 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center"><i class="fas fa-plus mr-2"></i> Add Book</button></div>
                    <div id="booksContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>
            </div>
            
            <div class="space-y-8">
                <div class="rounded-2xl glass-effect p-6 shadow-lg">
                    <h2 class="heading-font text-2xl font-bold mb-6 flex items-center"><i class="fas fa-link mr-3 text-primary-500"></i> Connect With Me</h2>
                    <div class="space-y-4">
                        <a href="#" target="_blank" class="flex items-center p-4 rounded-xl bg-gray-50 dark:bg-gray-800 hover:shadow-md transition-all group">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 flex items-center justify-center mr-4"><i class="fab fa-instagram text-white text-xl"></i></div>
                            <div><h3 class="font-bold group-hover:text-primary-600 transition-colors">Instagram</h3></div>
                        </a>
                        <a href="#" target="_blank" class="flex items-center p-4 rounded-xl bg-gray-50 dark:bg-gray-800 hover:shadow-md transition-all group">
                            <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center mr-4"><i class="fab fa-facebook-f text-white text-xl"></i></div>
                            <div><h3 class="font-bold group-hover:text-primary-600 transition-colors">Facebook</h3></div>
                        </a>
                        <a href="#" target="_blank" class="flex items-center p-4 rounded-xl bg-gray-50 dark:bg-gray-800 hover:shadow-md transition-all group">
                            <div class="w-12 h-12 rounded-full bg-red-600 flex items-center justify-center mr-4"><i class="fab fa-pinterest text-white text-xl"></i></div>
                            <div><h3 class="font-bold group-hover:text-primary-600 transition-colors">Pinterest</h3></div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <footer class="mt-16 pt-8 border-t border-gray-200 dark:border-gray-800 text-center"><p class="text-gray-600 dark:text-gray-400">&copy; <span id="currentYear"></span> atchanonr. All rights reserved.</p></footer>
    </div>
    
    <div id="addBookModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
            <div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold">Add New Book</h3><button id="closeModalBtn" class="text-gray-500 hover:text-gray-700"><i class="fas fa-times text-2xl"></i></button></div>
            <form id="bookForm"><div class="space-y-4"><div><label class="block text-sm font-medium mb-2">Book Title</label><input type="text" id="bookTitle" required class="w-full p-3 border rounded-lg bg-transparent"></div><div><label class="block text-sm font-medium mb-2">Author</label><input type="text" id="bookAuthor" required class="w-full p-3 border rounded-lg bg-transparent"></div><div><label class="block text-sm font-medium mb-2">Cover URL</label><input type="text" id="bookCover" class="w-full p-3 border rounded-lg bg-transparent"></div><div><label class="block text-sm font-medium mb-2">Description</label><textarea id="bookDescription" rows="3" class="w-full p-3 border rounded-lg bg-transparent"></textarea></div><div class="flex justify-end space-x-4 pt-4"><button type="button" id="cancelBookBtn" class="px-4 py-2 border rounded-lg">Cancel</button><button type="submit" class="px-4 py-2 bg-primary-500 text-white rounded-lg font-medium">Add Book</button></div></div></form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('overlay');
            const bgMusic = document.getElementById('backgroundMusic');
            const musicToggle = document.getElementById('musicToggle');
            const playIcon = document.getElementById('playIcon');
            const pauseIcon = document.getElementById('pauseIcon');
            bgMusic.volume = 0.5;

            // ระบบ Overlay: คลิกแล้วเข้าเว็บ + เล่นเพลง
            overlay.addEventListener('click', () => {
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 1000);
                
                bgMusic.play().then(() => {
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                    musicToggle.classList.add('animate-pulse');
                }).catch(err => console.log("Play blocked"));
            });

            // Music Button Logic
            musicToggle.addEventListener('click', () => {
                if (bgMusic.paused) {
                    bgMusic.play();
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                    musicToggle.classList.add('animate-pulse');
                } else {
                    bgMusic.pause();
                    playIcon.classList.remove('hidden');
                    pauseIcon.classList.add('hidden');
                    musicToggle.classList.remove('animate-pulse');
                }
            });

            // Dark Mode
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            }
            themeToggle.addEventListener('click', () => {
                html.classList.toggle('dark');
                localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
                const sun = document.getElementById('sunIcon');
                const moon = document.getElementById('moonIcon');
                sun.classList.toggle('hidden', !html.classList.contains('dark'));
                moon.classList.toggle('hidden', html.classList.contains('dark'));
            });

            // Book System
            const initialBooks = [
                { title: "Atomic Habits", author: "James Clear", cover: "https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1655988385i/40121378.jpg", desc: "Build good habits & break bad ones." },
                { title: "Sapiens", author: "Yuval Noah Harari", cover: "https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1703329310i/23692271.jpg", desc: "A brief history of humankind." }
            ];
            const container = document.getElementById('booksContainer');
            const createCard = (b) => `<div class="book-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-full flex flex-col"><div class="h-48 overflow-hidden relative"><img src="${b.cover || 'https://via.placeholder.com/300x450'}" class="w-full h-full object-cover transition-transform hover:scale-110 duration-500"></div><div class="p-5 flex-1 flex flex-col"><h3 class="font-bold text-lg mb-1 line-clamp-1">${b.title}</h3><p class="text-sm text-primary-600 dark:text-primary-400 mb-3">${b.author}</p><p class="text-sm text-gray-600 dark:text-gray-400 line-clamp-3 flex-1">${b.desc}</p></div></div>`;
            initialBooks.forEach(b => container.innerHTML += createCard(b));

            const modal = document.getElementById('addBookModal');
            document.getElementById('addBookBtn').addEventListener('click', () => modal.classList.remove('hidden'));
            const closeModal = () => modal.classList.add('hidden');
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('cancelBookBtn').addEventListener('click', closeModal);
            document.getElementById('bookForm').addEventListener('submit', (e) => {
                e.preventDefault();
                container.innerHTML += createCard({ title: document.getElementById('bookTitle').value, author: document.getElementById('bookAuthor').value, cover: document.getElementById('bookCover').value, desc: document.getElementById('bookDescription').value });
                e.target.reset(); closeModal();
            });
            document.getElementById('currentYear').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
